openapi: 3.0.3
info:
  title: Workplace API
  description: 事業所、社会保険、労働保険を取得する API
  version: 1.0.0

tags:
  - name: Locations
    description: 事業所
  - name: Social Insurances
    description: 社会保険
  - name: Labor Insurances
    description: 労働保険

paths:
  # ============================================================
  # 事業所
  # ============================================================
  /locations:
    get:
      operationId: getLocations
      tags: [Locations]
      summary: 事業所一覧の取得
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/Location' }

  # ============================================================
  # 社会保険
  # ============================================================
  /social-insurances:
    get:
      operationId: getSocialInsurances
      tags: [Social Insurances]
      summary: 社会保険一覧の取得
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/SocialInsurance' }

  /social-insurances/{id}/health-insurance-rate-histories:
    get:
      operationId: getHealthInsuranceRateHistories
      tags: [Social Insurances]
      summary: 健康保険料率履歴の取得
      description: 指定した社会保険に紐づく健康保険料率の有効時間にわたる履歴を返します。
      parameters:
        - $ref: '#/components/parameters/PathId'
        - name: as_of
          in: query
          description: システム時間の基準日時 (ISO 8601)
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/HealthInsuranceRateHistory' }

  # ============================================================
  # 労働保険
  # ============================================================
  /labor-insurances:
    get:
      operationId: getLaborInsurances
      tags: [Labor Insurances]
      summary: 労働保険一覧の取得
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/LaborInsurance' }

# ==============================================================
# Components
# ==============================================================
components:
  # ------------------------------------------------------------
  # Reusable Parameters
  # ------------------------------------------------------------
  parameters:
    PathId:
      name: id
      in: path
      required: true
      schema: { type: integer }

    Limit:
      name: limit
      in: query
      schema: { type: integer, default: 20 }

    Offset:
      name: offset
      in: query
      schema: { type: integer, default: 0 }

  # ------------------------------------------------------------
  # Schemas
  # ------------------------------------------------------------
  schemas:
    PaginatedResponse:
      type: object
      properties:
        total: { type: integer }

    # ==========================================================
    # 事業所
    # ==========================================================
    Location:
      type: object
      properties:
        id: { type: integer }
        code: { type: string }
        name: { type: string, maxLength: 100 }
        name_kana: { type: string, maxLength: 100 }
        is_headquarter: { type: boolean }
        url: { type: string, maxLength: 500 }
        tel: { type: string, maxLength: 30 }
        fax: { type: string, maxLength: 30 }
        address: { $ref: '#/components/schemas/LocationAddress' }
        insurance_coverage: { $ref: '#/components/schemas/LocationInsuranceCoverage' }

    LocationAddress:
      type: object
      properties:
        zip: { type: string, maxLength: 8 }
        prefecture_id: { type: integer }
        municipality: { type: string, maxLength: 255 }
        municipality_kana: { type: string, maxLength: 255 }
        house_number: { type: string, maxLength: 255 }
        house_number_kana: { type: string, maxLength: 255 }
        building: { type: string, maxLength: 255 }
        building_kana: { type: string, maxLength: 255 }

    LocationInsuranceCoverage:
      type: object
      properties:
        social_insurance_id: { type: integer, nullable: true }
        labor_insurance_id: { type: integer, nullable: true }

    # ==========================================================
    # 社会保険
    # ==========================================================
    SocialInsurance:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        business_type_social_insurance: { type: string }
        personnel_corporation_category: { type: string }
        headquarter_branch_category: { type: string }
        domestic_foreign_category: { type: string }
        representative: { $ref: '#/components/schemas/SocialInsuranceRepresentative' }
        health_insurance: { $ref: '#/components/schemas/HealthInsurance' }
        pension_insurance: { $ref: '#/components/schemas/PensionInsurance' }

    SocialInsuranceRepresentative:
      type: object
      properties:
        entrepreneur_role_name: { type: string }
        entrepreneur_name: { type: string }
        entrepreneur_name_kana: { type: string }

    HealthInsurance:
      type: object
      properties:
        current_health_insurance_type: { type: string }
        prefecture_id: { type: string }
        covered_workplace_sign: { type: string }
        number1: { type: string }
        authority_name: { type: string }

    HealthInsuranceRateHistory:
      type: object
      properties:
        id: { type: integer }
        applied_at: { type: string, format: date }
        insured_health_insurance_rate: { type: number, format: float }
        entrepreneur_health_insurance_rate: { type: number, format: float }
        insured_nursing_insurance_rate: { type: number, format: float }
        entrepreneur_nursing_insurance_rate: { type: number, format: float }
        insured_child_care_support_contribution_rate: { type: number, format: float }
        entrepreneur_child_care_support_contribution_rate: { type: number, format: float }
        valid_from: { type: string, format: date-time }
        valid_to: { type: string, format: date-time, nullable: true }
        system_from: { type: string, format: date-time }
        system_to: { type: string, format: date-time, nullable: true }

    PensionInsurance:
      type: object
      properties:
        group_name: { type: string }
        group_number: { type: string }
        group_sign: { type: string }
        city_sign: { type: string }
        submission_destination_e: { type: string }

    # ==========================================================
    # 労働保険
    # ==========================================================
    LaborInsurance:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        representative: { $ref: '#/components/schemas/LaborInsuranceRepresentative' }
        common_settings: { $ref: '#/components/schemas/LaborInsuranceCommonSettings' }
        compensation_insurance: { $ref: '#/components/schemas/CompensationInsurance' }
        employment_insurance: { $ref: '#/components/schemas/EmploymentInsurance' }

    LaborInsuranceRepresentative:
      type: object
      properties:
        entrepreneur_role_name: { type: string }
        entrepreneur_name: { type: string }
        entrepreneur_name_kana: { type: string }

    LaborInsuranceCommonSettings:
      type: object
      properties:
        submission_destination_k_id: { type: string }
        submission_address: { type: string }
        compensation_insurance: { type: boolean }
        unemployment_insurance: { type: boolean }
        labor_insurance_special_industry: { type: boolean }

    CompensationInsurance:
      type: object
      nullable: true
      properties:
        inspection_office_name: { type: string }
        labor_insurance_number: { type: string }
        business_outline: { type: string }
        compensation_insurance_industry_id: { type: string }
        jurisdiction2_number: { type: string }
        insurance_related_number: { type: string }
        industry_number: { type: string }
        industry_classification_number: { type: string }
        is_merit_system_applied: { type: boolean }
        merit_system_compensation_insurance_rate: { type: number, format: float }

    EmploymentInsurance:
      type: object
      nullable: true
      properties:
        authority_name: { type: string }
        number1: { type: string }
        number2: { type: string }
        number3: { type: string }
        employment_insurance_industry_id: { type: string }
        submission_prefecture: { type: string }
        submission_destination_d_id: { type: string }
