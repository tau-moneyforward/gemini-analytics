<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クロス分析</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .page-nav {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .page-nav a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.85rem;
      padding: 0.35rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 6px;
    }
    .page-nav a:hover { background: var(--surface-hover); }
    .page-nav a.current { background: var(--accent); color: #fff; border-color: var(--accent); }

    .stacked-chart { margin-bottom: 2rem; }
    .stacked-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }
    .stacked-label {
      width: 180px;
      font-size: 0.82rem;
      text-align: right;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .stacked-bar-wrap {
      flex: 1;
      height: 32px;
      display: flex;
      gap: 2px;
      background: var(--bg);
    }
    .stacked-segment {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.68rem;
      font-weight: 600;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.15);
      transition: width 0.5s ease;
      min-width: 0;
      overflow: hidden;
      border-radius: 4px;
      cursor: default;
    }
    .stacked-segment.seg-accepted   { background: #60a5fa; }
    .stacked-segment.seg-deepened   { background: #34d399; }
    .stacked-segment.seg-refined    { background: #a78bfa; }
    .stacked-segment.seg-error_found { background: #f472b6; }
    .stacked-segment.seg-debated    { background: #fb923c; }
    .stacked-segment.seg-switched   { background: #fbbf24; }
    .stacked-segment.seg-abandoned  { background: #94a3b8; }

    .stacked-stats {
      width: 120px;
      font-size: 0.75rem;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .legend {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
      font-size: 0.82rem;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 3px;
    }

    .insight-box {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-top: 0.75rem;
      font-size: 0.82rem;
      color: var(--text);
      line-height: 1.6;
    }

    /* Heatmap */
    .heatmap-controls {
      display: flex;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .heatmap-controls label {
      font-size: 0.82rem;
      color: var(--text-muted);
    }
    .heatmap-controls select {
      font-size: 0.82rem;
      padding: 0.3rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
    }
    .heatmap-wrap {
      overflow-x: auto;
      margin-bottom: 1rem;
    }
    .hm-grid {
      display: grid;
      gap: 2px;
      font-size: 0.78rem;
    }
    .hm-grid .hm-hdr {
      font-weight: 600;
      color: var(--text-muted);
      text-align: center;
      padding: 0.35rem 0.3rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }
    .hm-grid .hm-row-hdr {
      font-weight: 600;
      color: var(--text-muted);
      text-align: right;
      padding: 0.35rem 0.5rem;
      white-space: nowrap;
    }
    .hm-grid .hm-cell {
      text-align: center;
      padding: 0.35rem 0.3rem;
      border-radius: 4px;
      cursor: default;
      min-height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hm-grid .hm-cell:hover {
      outline: 2px solid var(--accent);
      outline-offset: -1px;
    }
    .hm-grid .hm-total {
      color: var(--text-muted);
      text-align: center;
      font-size: 0.72rem;
      padding: 0.35rem 0.3rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .heatmap-tooltip {
      position: absolute;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      font-size: 0.78rem;
      pointer-events: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      z-index: 10;
      display: none;
      white-space: nowrap;
    }

    .pattern-box {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      font-size: 0.82rem;
      color: var(--text);
      line-height: 1.8;
    }
    .pattern-item {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 0.25rem;
    }
    .pattern-ratio {
      font-weight: 700;
      font-size: 0.9rem;
      min-width: 48px;
      text-align: right;
      color: var(--accent);
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <h1>クロス分析</h1>
      <p class="subtitle">4軸のクロス集計 — 積み上げ棒グラフ + ヒートマップ</p>
    </div>
  </header>

  <main>
    <nav class="page-nav">
      <a href="index.html">集計ダッシュボード</a>
      <a href="correlation.html" class="current">クロス分析</a>
      <a href="sankey.html">サンキーダイアグラム</a>
      <a href="reference.html">類型リファレンス</a>
    </nav>

    <h2 style="font-size:1.1rem;margin-bottom:1rem">結末パターン別の構成比</h2>

    <div class="legend">
      <div class="legend-item"><span class="legend-dot" style="background:#60a5fa"></span> 一発承認</div>
      <div class="legend-item"><span class="legend-dot" style="background:#34d399"></span> 追加深掘り</div>
      <div class="legend-item"><span class="legend-dot" style="background:#a78bfa"></span> 修正リファイン</div>
      <div class="legend-item"><span class="legend-dot" style="background:#f472b6"></span> エラー指摘</div>
      <div class="legend-item"><span class="legend-dot" style="background:#fb923c"></span> 反論・議論</div>
      <div class="legend-item"><span class="legend-dot" style="background:#fbbf24"></span> トピック転換</div>
      <div class="legend-item"><span class="legend-dot" style="background:#94a3b8"></span> 放棄</div>
    </div>

    <section class="chart-card">
      <h2>何をしてほしかったか × 結末</h2>
      <div class="stacked-chart" id="method-outcome"></div>
      <div class="insight-box" id="method-insight"></div>
    </section>

    <section class="chart-card" style="margin-top:1rem">
      <h2>プロンプトに含めた情報 × 結末</h2>
      <div class="stacked-chart" id="context-outcome"></div>
      <div class="insight-box" id="context-insight"></div>
    </section>

    <section class="chart-card" style="margin-top:1rem">
      <h2>クエリ数 × 結末</h2>
      <div class="stacked-chart" id="query-outcome"></div>
      <div class="insight-box" id="query-insight"></div>
    </section>

    <section class="chart-card" style="margin-top:1rem">
      <h2>話題ジャンル × 結末</h2>
      <div class="stacked-chart" id="category-outcome"></div>
      <div class="insight-box" id="category-insight"></div>
    </section>

    <hr style="margin:2rem 0;border:none;border-top:1px solid var(--border)">

    <h2 style="font-size:1.1rem;margin-bottom:1rem">任意の2軸クロス集計ヒートマップ</h2>

    <section class="chart-card">
      <div class="heatmap-controls">
        <label>行:
          <select id="hm-row">
            <option value="method">何をしてほしかったか</option>
            <option value="context">プロンプトに含めた情報</option>
            <option value="interaction" selected>結末パターン</option>
            <option value="category">話題ジャンル</option>
          </select>
        </label>
        <span style="color:var(--text-muted)">×</span>
        <label>列:
          <select id="hm-col">
            <option value="method" selected>何をしてほしかったか</option>
            <option value="context">プロンプトに含めた情報</option>
            <option value="interaction">結末パターン</option>
            <option value="category">話題ジャンル</option>
          </select>
        </label>
      </div>
      <div class="heatmap-wrap" id="heatmap-container"></div>
      <h3 style="font-size:0.95rem;margin:1rem 0 0.5rem">期待値からの乖離が大きい組み合わせ</h3>
      <div class="pattern-box" id="pattern-findings"></div>
    </section>
  </main>

  <footer>
    <p>分析日: 2026-02-27 | 結末7パターン・4軸のクロス集計</p>
  </footer>

  <div class="heatmap-tooltip" id="hm-tooltip"></div>

  <script src="data.js"></script>
  <script src="correlation.js"></script>
</body>
</html>
