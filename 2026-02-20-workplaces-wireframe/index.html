<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基幹業務 SaaS プロトタイプ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="sidebar">
            <button class="nav-item active" onclick="switchTab('locations', this)">事業所</button>
            <button class="nav-item" onclick="switchTab('social-insurances', this)">社保情報</button>
            <button class="nav-item" onclick="switchTab('labor-insurances', this)">労保情報</button>
        </div>

        <div class="main-content">
            
            <div id="locations" class="page active">
                <div class="page-header">
                    <h1 class="page-title">事業所</h1>
                    <button class="btn-create">+ 作成</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>コード</th>
                            <th>名前</th>
                            <th>社保情報</th>
                            <th>労保情報</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-locations">
                        </tbody>
                </table>
            </div>

            <div id="social-insurances" class="page">
                <div class="page-header">
                    <h1 class="page-title">社保情報</h1>
                    <button class="btn-create">+ 作成</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>コード</th>
                            <th>名前</th>
                            <th>適用事業所</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-social-insurances">
                        </tbody>
                </table>
            </div>

            <div id="labor-insurances" class="page">
                <div class="page-header">
                    <h1 class="page-title">労保情報</h1>
                    <button class="btn-create">+ 作成</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>コード</th>
                            <th>名前</th>
                            <th>適用事業所</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-labor-insurances">
                        </tbody>
                </table>
            </div>

        </div>
    </div>

    <script src="data.js"></script>
    <script src="main.js"></script>
</body>
</html>
